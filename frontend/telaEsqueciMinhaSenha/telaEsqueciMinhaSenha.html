<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="stylesheet" href="../global/acessibilidade.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esqueci Minha Senha - TecnoSenior</title>
    <link rel="stylesheet" href="estiloTelaEsqueciMinhaSenha.css" />
  </head>

  <body>
    <div class="barra-acessibilidade">
      <button
        onclick="alterarFonte('aumentar')"
        aria-label="Aumentar tamanho da letra"
      >
        A+
      </button>
      <button
        onclick="alterarFonte('diminuir')"
        aria-label="Diminuir tamanho da letra"
      >
        A-
      </button>
      <button onclick="alternarContraste()" aria-label="Ativar alto contraste">
        🌗 Alto Contraste
      </button>
      <button
        id="btn-destaque-leitura"
        onclick="alternarDestaqueLeitura()"
        aria-label="Ativar destaque de leitura"
        aria-pressed="false"
      >
        🔆 Destaque de Leitura
      </button>
      <button
        id="btn-voz-alta"
        onclick="alternarVozAlta()"
        aria-label="Ativar leitura em voz alta"
        aria-pressed="false"
      >
        🔊 Voz Alta
      </button>
    </div>

    <div class="login-container">
      <h2>Esqueci minha senha</h2>

      <form id="form-request">
        <p style="font-weight: bold; margin-bottom: 15px; font-size: 1.1em">
          Digite seus dados para solicitar um código:
        </p>

        <div class="input-group">
          <label
            for="request-email"
            style="display: block; font-weight: bold; margin-bottom: 5px"
            >Email:</label
          >
          <input
            type="email"
            id="request-email"
            placeholder="exemplo@email.com"
            required
          />
        </div>

        <div class="input-group" style="margin-top: 15px">
          <label
            for="request-username"
            style="display: block; font-weight: bold; margin-bottom: 5px"
            >Nome de usuário:</label
          >
          <input
            type="text"
            id="request-username"
            placeholder="Seu nome de usuário"
            required
          />
        </div>

        <p
          id="request-message"
          style="
            font-size: 0.9em;
            min-height: 1.2em;
            font-weight: bold;
            margin-top: 10px;
          "
        ></p>

        <button type="submit" class="login-btn" style="margin-top: 10px">
          Solicitar Código
        </button>
      </form>

      <form id="form-reset" style="display: none">
        <p style="font-weight: bold; margin-bottom: 15px; font-size: 1.1em">
          Digite o código e sua nova senha:
        </p>

        <div class="input-group">
          <label
            for="reset-code"
            style="display: block; font-weight: bold; margin-bottom: 5px"
            >Código de segurança:</label
          >
          <input
            type="text"
            id="reset-code"
            placeholder="Código recebido"
            required
          />
        </div>

        <div class="input-group" style="margin-top: 15px">
          <label
            for="reset-senha"
            style="display: block; font-weight: bold; margin-bottom: 5px"
            >Nova Senha:</label
          >
          <input
            type="password"
            id="reset-senha"
            placeholder="Digite a nova senha"
            required
          />
        </div>

        <div class="input-group" style="margin-top: 15px">
          <label
            for="reset-confirmar-senha"
            style="display: block; font-weight: bold; margin-bottom: 5px"
            >Confirme sua senha:</label
          >
          <input
            type="password"
            id="reset-confirmar-senha"
            placeholder="Repita a nova senha"
            required
          />
        </div>

        <p
          id="reset-message"
          style="
            color: red;
            font-size: 0.9em;
            min-height: 1.2em;
            font-weight: bold;
            margin-top: 10px;
          "
        ></p>

        <button type="submit" class="login-btn" style="margin-top: 10px">
          Cadastrar nova senha
        </button>
      </form>

      <div class="links" style="margin-top: 20px">
        <a href="../telaLogin/telaLogin.html">Voltar para o Login</a>
      </div>
    </div>

    <script src="esqueciSenha.js" defer></script>
    <script src="../global/acessibilidade.js"></script>
  </body>
</html>
